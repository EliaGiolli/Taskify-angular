<header 
  class="main-header" 
  role="banner"
>
  <div class="logo-section" aria-labelledby="logo-taskify">
    <div class="logo-wrapper">
      <i 
        class="fa fa-tasks icon" 
        aria-hidden="true">
      </i>
      <h1 
        class="logo"
        id="logo-taskify"
        >
        Taskify
      </h1>
    </div>
    <p class="tagline">Your definitive task manager!</p>
  </div>

  <i 
    class="theme-toggle"
    [class]="currentTheme() === 'dark' ? 'fas fa-sun theme-toggle' : 'fas fa-moon theme-toggle'"
    (click)="toggleTheme()"
    aria-label="Toggle theme"
  ></i>
</header>
